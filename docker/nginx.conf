server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    # Mirror the .htaccess restrictions in include/ and templates/
    location ~ ^/(include|cache)/ {
        deny all;
    }
    location ~ \.tpl$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
